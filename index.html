<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Gallery Project</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header>
    <h1 id="top">Responsive Image Gallery</h1>
  </header>

  <main>

    <p>
      This website showcases a collection of nature and city landscapes. 
      The layout automatically adapts to mobile, tablet, and large screens.
      It also responds to user accessibility preferences such as dark mode
      and reduced motion settings.
    </p>

    <div class="grid">

      <figure>
        <img src="images/beach.jpg" alt="Clear blue ocean with white sand beach under a bright sky">
        <figcaption>Beautiful Beach</figcaption>
      </figure>

      <figure>
        <img src="images/forest.jpg" alt="Dense green forest with sunlight shining through the trees">
        <figcaption>Green Forest</figcaption>
      </figure>

      <figure>
        <img src="images/city.jpg" alt="Modern city skyline at sunset with colorful building lights">
        <figcaption>City Skyline</figcaption>
      </figure>

      <figure>
        <img src="images/mountains.jpg" alt="Snow covered mountains under a bright blue sky">
        <figcaption>Mountain View</figcaption>
      </figure>

      <figure>
        <img src="images/lake.jpg" alt="Calm lake reflecting trees and sky during sunset">
        <figcaption>Peaceful Lake</figcaption>
      </figure>

      <figure>
        <img src="images/desert.jpg" alt="Golden desert sand dunes under a clear sky">
        <figcaption>Desert Landscape</figcaption>
      </figure>

    </div>

  </main>

  <footer>
    <a href="#top">Jump to the Top</a>
  </footer>

</body>

</html>
